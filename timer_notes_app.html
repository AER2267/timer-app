
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计时与记录工具</title>
<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#38bdf8;
--text:#e2e8f0;
}
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:var(--text);
display:flex;
justify-content:center;
padding:30px;
}
.container{
width:900px;
max-width:95%;
}
.card{
background:var(--card);
border-radius:16px;
padding:25px;
margin-bottom:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
h1{
margin-top:0;
}
.timer{
font-size:48px;
text-align:center;
margin:20px 0;
letter-spacing:2px;
}
.buttons{
text-align:center;
}
button{
background:var(--accent);
border:none;
padding:10px 16px;
margin:6px;
border-radius:8px;
font-size:14px;
cursor:pointer;
}
button.secondary{
background:#64748b;
}
textarea{
width:100%;
height:80px;
border-radius:8px;
border:none;
padding:10px;
margin-top:10px;
}
.note{
background:#0f172a;
padding:12px;
border-radius:8px;
margin-top:10px;
}
.note small{
color:#94a3b8;
}
.stats{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
}
.stat{
background:#0f172a;
padding:15px;
border-radius:10px;
margin-top:10px;
flex:1;
margin-right:10px;
}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h1>⏱ 计时器</h1>
<div class="timer" id="timer">00:00:00</div>
<div class="buttons">
<button onclick="startTimer()">开始</button>
<button onclick="pauseTimer()">暂停</button>
<button onclick="resetTimer()" class="secondary">重置</button>
</div>
</div>

<div class="card">
<h1>📊 今日统计</h1>
<div class="stats">
<div class="stat">今日累计时间<br><b id="todayTime">0 分钟</b></div>
<div class="stat">记录数量<br><b id="noteCount">0</b></div>
</div>
</div>

<div class="card">
<h1>📝 记录</h1>
<textarea id="noteInput" placeholder="写下今天做了什么..."></textarea>
<br>
<button onclick="saveNote()">保存记录</button>
<button onclick="exportNotes()" class="secondary">导出记录</button>
<div id="notes"></div>
</div>

</div>

<script>
let seconds=0
let interval=null

function formatTime(s){
let h=String(Math.floor(s/3600)).padStart(2,'0')
let m=String(Math.floor((s%3600)/60)).padStart(2,'0')
let sec=String(s%60).padStart(2,'0')
return `${h}:${m}:${sec}`
}

function updateTimer(){
seconds++
document.getElementById('timer').innerText=formatTime(seconds)
}

function startTimer(){
if(!interval){
interval=setInterval(updateTimer,1000)
}
}

function pauseTimer(){
clearInterval(interval)
interval=null
saveTodayTime()
}

function resetTimer(){
pauseTimer()
seconds=0
updateTimerDisplay()
}

function updateTimerDisplay(){
document.getElementById('timer').innerText=formatTime(seconds)
}

function saveTodayTime(){
let today=new Date().toDateString()
let data=JSON.parse(localStorage.getItem('timeData')||'{}')
if(!data[today]) data[today]=0

data[today]+=seconds
localStorage.setItem('timeData',JSON.stringify(data))
updateStats()
}

function updateStats(){
let today=new Date().toDateString()
let data=JSON.parse(localStorage.getItem('timeData')||'{}')
let min=Math.floor((data[today]||0)/60)
document.getElementById('todayTime').innerText=min+' 分钟'

let notes=JSON.parse(localStorage.getItem('notes')||'[]')
document.getElementById('noteCount').innerText=notes.length
}

function saveNote(){
let text=document.getElementById('noteInput').value.trim()
if(!text) return

let notes=JSON.parse(localStorage.getItem('notes')||'[]')

notes.unshift({
text:text,
time:new Date().toLocaleString()
})

localStorage.setItem('notes',JSON.stringify(notes))

document.getElementById('noteInput').value=''

loadNotes()
updateStats()
}

function loadNotes(){
let notes=JSON.parse(localStorage.getItem('notes')||'[]')
let container=document.getElementById('notes')
container.innerHTML=''

notes.forEach((n,i)=>{
let div=document.createElement('div')
div.className='note'

div.innerHTML=`<small>${n.time}</small><br>${n.text}<br>
<button onclick="deleteNote(${i})">删除</button>`

container.appendChild(div)
})
}

function deleteNote(i){
let notes=JSON.parse(localStorage.getItem('notes')||'[]')
notes.splice(i,1)
localStorage.setItem('notes',JSON.stringify(notes))
loadNotes()
updateStats()
}

function exportNotes(){
let notes=JSON.parse(localStorage.getItem('notes')||'[]')
let text='记录导出\n\n'

notes.forEach(n=>{
text+=n.time+'\n'+n.text+'\n\n'
})

let blob=new Blob([text],{type:'text/plain'})
let a=document.createElement('a')
a.href=URL.createObjectURL(blob)
a.download='记录.txt'
a.click()
}

loadNotes()
updateStats()
updateTimerDisplay()
</script>

</body>
</html>
